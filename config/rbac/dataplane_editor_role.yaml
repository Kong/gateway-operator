# permissions for end users to edit dataplanes.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: dataplane-editor-role
rules:
- apiGroups:
  - operator.konghq.com
  resources:
  - dataplanes
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - operator.konghq.com
  resources:
  - dataplanes/status
  verbs:
  - get
