---
kind: GatewayClass
apiVersion: gateway.networking.k8s.io/v1alpha2
metadata:
  name: kong-gatewayclass-sample
spec:
  controllerName: konghq.com/kic-gateway-controller
---
kind: Gateway
apiVersion: gateway.networking.k8s.io/v1alpha2
metadata:
  name: kong-gateway-sample
  namespace: kong
spec:
  gatewayClassName: kong-gatewayclass-sample
  listeners:
  - name: http
    protocol: HTTP
    port: 80
